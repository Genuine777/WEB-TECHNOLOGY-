<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navigation links</title>
<style>
  body{margin:0;font-family:sans-serif;text-align:center;}
  header{background:#333;padding:10px;}
  nav a{color:#fff;margin:0 10px;text-decoration:none;}
  section{padding:20px;}
  img{width:120px;margin:5px;}
  form{max-width:250px;margin:auto;display:flex;flex-direction:column;}
  input,textarea{margin:5px;padding:8px;}
  button{padding:8px;background:#333;color:#fff;border:none;}
</style>
</head>
<body>
<header>
  <nav>
    <a href="#about">About</a>
    <a href="#services">Services</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="about"><h2>About Us</h2><p>Subodh Thakuri</p></section>
<section id="services"><h2>Services</h2><p>Sleep</p></section>
<section id="gallery"><h2>Gallery</h2>
  <img src="D:\edit\1000009133.jpg" alt="tour">
  <img src="D:\edit\1000009156.jpg" alt="tab">
</section>
<section id="contact"><h2>Contact Us</h2>
  <form>
    <input type="text" placeholder="Name" required>
    <input type="email" placeholder="Email" required>
    <textarea rows="3" placeholder="Message" required></textarea>
    <button type="submit">Send</button>
  </form>
</section>
</body>
</html>
