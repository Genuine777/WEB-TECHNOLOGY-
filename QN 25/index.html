<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team Members</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" >
    <style>
        /* --- CSS STYLES --- */
        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background-color: #f4f4f4;
            font-family: 'Segoe UI', sans-serif;
        }

        .team-section {
            min-height: 100vh; /* Covers the whole page */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .team-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .team-header .subtitle {
            color: #888;
            font-size: 14px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .team-header h2 {
            font-size: 36px;
            margin: 0;
            color: #222;
        }

        /* The Responsive Container */
        .team-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 100%;
            max-width: 1100px;
        }

        /* Card Styling */
        .team-card {
            background: #fff;
            width: 240px;
            padding: 35px 15px 20px 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .team-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .image-wrapper img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            outline: 2px solid #eee;
            margin-bottom: 15px;
        }

        .team-card h3 {
            font-size: 20px;
            margin: 10px 0 5px;
            color: #333;
        }

        .team-card p {
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Icon Row */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }

        .social-links i {
            color: #555;
            font-size: 16px;
            transition: 0.2s;
            cursor: pointer;
        }

        .social-links i:hover {
            color: #007bff; /* Color change on hover */
        }

        /* Mobile View (Matches the Mobile screen in your image) */
        @media (max-width: 600px) {
            .team-container {
                flex-direction: column;
                align-items: center;
            }
            .team-card {
                width: 85%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>

<section class="team-section">
    <div class="team-header">
        <p class="subtitle">Experts</p>
        <h2>Our Team Members</h2>
    </div>

    <div class="team-container">
        <div class="team-card">
            <div class="image-wrapper">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Naman">
            </div>
            <h3>Naman</h3>
            <p>Programmer</p>
            <div class="social-links">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-youtube"></i>
                <i class="fab fa-instagram"></i>
            </div>
        </div>

        <div class="team-card">
            <div class="image-wrapper">
                <img src="https://randomuser.me/api/portraits/men/44.jpg" alt="Ravi">
            </div>
            <h3>Ravi</h3>
            <p>CEO</p>
            <div class="social-links">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-youtube"></i>
                <i class="fab fa-instagram"></i>
            </div>
        </div>

        <div class="team-card">
            <div class="image-wrapper">
                <img src="https://randomuser.me/api/portraits/men/85.jpg" alt="Rishi">
            </div>
            <h3>Rishi</h3>
            <p>Wordpress</p>
            <div class="social-links">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-youtube"></i>
                <i class="fab fa-instagram"></i>
            </div>
        </div>

        <div class="team-card">
            <div class="image-wrapper">
                <img src="https://randomuser.me/api/portraits/men/22.jpg" alt="Sudarsan">
            </div>
            <h3>Sudarsan</h3>
            <p>Youtuber</p>
            <div class="social-links">
                <i class="fab fa-facebook-f"></i>
                <i class="fab fa-youtube"></i>
                <i class="fab fa-instagram"></i>
            </div>
        </div>
    </div>
</section>

</body>
</html>
