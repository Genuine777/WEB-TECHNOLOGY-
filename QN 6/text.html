<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Formatting Tags</title>
</head>
<body>
  <p><b>Bold</b> and <strong>Strong</strong></p>
  <p><i>Italic</i> and <em>Emphasis</em></p>
  <p><q>Inline Quote</q></p>
  <blockquote>Blockquote text</blockquote>
  <p><del>Deleted</del> <ins>Inserted</ins></p>
  <p><font color="blue">Font tag (deprecated)</font></p>
  <pre>Preformatted text</pre>
  <p><code>printf("Hello");</code> <tt>Teletype</tt></p>
  <p>Entities: &copy; &reg; &lt; &gt; &amp;</p>
  <p>H<sub>2</sub>O and x<sup>2</sup></p>
</body>
</html>
