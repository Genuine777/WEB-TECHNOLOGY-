<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3 Types of CSS</title>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333; /* Styles all <h1> elements */
        }
    </style>

    </head>
<body>

    <h1>Demonstrating CSS Types</h1>

    <p style="color: blue; font-weight: bold;">
        This paragraph is styled using Inline CSS.
    </p>

    <p>
        This paragraph is styled by the Internal CSS in the head.
    </p>

    <div style="background: white; padding: 20px; border: 1px solid #ccc;">
        External CSS is the best practice for large sites!
    </div>

</body>
</html>
