<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout 2 </title>
  <link rel="stylesheet" href="style2.css">
</head>
<body class="l2-site-container">
  <div class="l2-wrapper">
    <header class="l2-box">Header</header>
    
    <main class="l2-middle">
        <aside class="l2-box sidebar">Side Bar</aside>
        
        <div class="l2-content-area">
            <div class="l2-box c1">Content 1</div>
            <div class="l2-bottom-content">
                <div class="l2-box c2">Content 2</div>
                <div class="l2-box c3">Content 3</div>
            </div>
        </div>
    </main>
    
    <footer class="l2-box">Footer</footer>
  </div>
</body>
</html>
